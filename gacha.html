<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tsum Tsum Gacha</title>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; }
        #gacha-wrapper { position: relative; width: 360px; height: 600px; background: linear-gradient(180deg, #2c3e50 0%, #000000 100%); border: 10px solid #333; border-radius: 45px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; padding: 20px 0; text-align: center; color: #fff; z-index: 10; }
        h1 { margin: 0; font-size: 28px; color: #ff4081; text-shadow: 0 0 10px rgba(255,64,129,0.5); }
        .coin-box { background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 20px; border: 1px solid #ffd700; color: #ffd700; font-weight: bold; margin-top: 10px; display: flex; align-items: center; }
        .coin-icon { width: 16px; height: 16px; background: #ffd700; border-radius: 50%; margin-right: 8px; border: 2px solid #fff; }
        #machine-container { position: relative; width: 260px; height: 300px; margin-top: 30px; display: flex; justify-content: center; }
        #machine { width: 200px; height: 200px; background: #ff4081; border-radius: 50% 50% 10% 10%; border: 8px solid #ad1457; position: relative; z-index: 2; box-shadow: inset -10px -10px 0 rgba(0,0,0,0.1); }
        #glass { position: absolute; top: 20px; width: 140px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; left: 50%; transform: translateX(-50%); border: 2px solid rgba(255,255,255,0.5); }
        #knob { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 50px; height: 50px; background: #eee; border-radius: 50%; border: 4px solid #ad1457; cursor: pointer; transition: transform 0.5s; }
        #knob.spin { transform: translateX(-50%) rotate(360deg); }
        #exit { position: absolute; bottom: -10px; width: 60px; height: 40px; background: #333; border-radius: 10px 10px 0 0; }
        .btn-draw { margin-top: 40px; padding: 15px 40px; font-size: 20px; background: #ffd700; color: #000; border: none; border-radius: 40px; cursor: pointer; box-shadow: 0 6px 0 #b8860b; font-weight: bold; z-index: 10; }
        .btn-draw:active { transform: translateY(4px); box-shadow: 0 2px 0 #b8860b; }
        .btn-draw:disabled { background: #666; box-shadow: 0 6px 0 #333; cursor: not-allowed; color: #999; }
        #result-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #result-tsum { width: 120px; height: 120px; border-radius: 50%; margin-bottom: 20px; position: relative; transform: scale(0); animation: popUp 0.5s 0.3s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popUp { to { transform: scale(1); } }
        #result-name { color: #fff; font-size: 24px; font-weight: bold; margin-bottom: 30px; }
        .btn-close { padding: 10px 30px; background: #ff4081; color: #fff; border: none; border-radius: 20px; cursor: pointer; }
        #back-link { position: absolute; bottom: 30px; color: #aaa; text-decoration: none; font-size: 14px; border-bottom: 1px solid #aaa; }
    </style>
</head>
<body>
<div id="gacha-wrapper">
    <div class="header"><h1>PREMIUM GACHA</h1><div class="coin-box"><div class="coin-icon"></div><span id="total-coins">0</span></div></div>
    <div id="machine-container"><div id="machine"><div id="glass"></div><div id="knob"></div></div><div id="exit"></div></div>
    <button class="btn-draw" id="drawBtn">1,000 COINS</button>
    <a href="index.html" id="back-link">BACK TO GAME</a>
    <div id="result-overlay"><div id="result-tsum"></div><div id="result-name"></div><button class="btn-close" id="closeBtn">OK</button></div>
</div>
<script>
    const GACHA_COST = 1000;
    let totalCoins = parseInt(localStorage.getItem('tsum_total_coins')) || 0;
    const coinDisplay = document.getElementById('total-coins');
    const drawBtn = document.getElementById('drawBtn');
    const knob = document.getElementById('knob');
    const resultOverlay = document.getElementById('result-overlay');
    const resultTsum = document.getElementById('result-tsum');
    const resultName = document.getElementById('result-name');
    const tsumList = [{ name: 'Pink Tsum', color: '#FF70A6', eyes: '#4a001f', cheeks: '#ffaccb' },{ name: 'Blue Tsum', color: '#70D6FF', eyes: '#002f5d', cheeks: '#b5e8ff' },{ name: 'Yellow Tsum', color: '#FFD670', eyes: '#5d4b00', cheeks: '#fff0c7' },{ name: 'Green Tsum', color: '#A0FF70', eyes: '#1b5d00', cheeks: '#d6ffc2' },{ name: 'White Tsum', color: '#E9ECEF', eyes: '#263238', cheeks: '#ffffff' }];
    function updateUI() { coinDisplay.innerText = totalCoins.toLocaleString(); drawBtn.disabled = totalCoins < GACHA_COST; }
    function drawGacha() {
        if (totalCoins < GACHA_COST) return;
        totalCoins -= GACHA_COST; localStorage.setItem('tsum_total_coins', totalCoins); updateUI();
        knob.classList.add('spin'); drawBtn.disabled = true;
        setTimeout(() => { const result = tsumList[Math.floor(Math.random() * tsumList.length)]; showResult(result); knob.classList.remove('spin'); }, 1000);
    }
    function showResult(tsum) {
        resultTsum.style.backgroundColor = tsum.color;
        resultTsum.innerHTML = `<div style="position:absolute; top:40%; left:25%; width:15px; height:15px; background:${tsum.eyes}; border-radius:50%;"></div><div style="position:absolute; top:40%; right:25%; width:15px; height:15px; background:${tsum.eyes}; border-radius:50%;"></div><div style="position:absolute; top:55%; left:15%; width:20px; height:20px; background:${tsum.cheeks}; border-radius:50%;"></div><div style="position:absolute; top:55%; right:15%; width:20px; height:20px; background:${tsum.cheeks}; border-radius:50%;"></div>`;
        resultName.innerText = tsum.name; resultOverlay.style.display = 'flex';
    }
    drawBtn.addEventListener('click', drawGacha);
    document.getElementById('closeBtn').addEventListener('click', () => { resultOverlay.style.display = 'none'; updateUI(); });
    updateUI();
</script>
</body>
</html>
